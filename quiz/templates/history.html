{% extends 'base.html' %} {% block content %}
<h2>History</h2>

<table>
  <tr>
    <th>Username</th>
    <th>Materi</th>
    <th>Skor</th>
  </tr>

  {% for h in histories %}
  <tr>
    <td>{{ h.username }}</td>
    <td>{{ h.material }}</td>
    <td>{{ h.score }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
